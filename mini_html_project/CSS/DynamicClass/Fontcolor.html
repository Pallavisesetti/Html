<!DOCTYPE html>
<html>

<head>
    <script>
        function onClickColorChange() {
            debugger;
            var fontColor = document.getElementById("txtColor").value;
            document.getElementById("pText").style.color = fontColor;
        }

</head>

<body>

</body>


</html>
