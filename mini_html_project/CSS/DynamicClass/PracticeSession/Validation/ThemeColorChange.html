<!DOCTYPE html>
<html>

<head>
    <script>
        function onClickRed() {
            document.body.style.backgroundColor = "red";
        }
        function onClickBlue() {
            document.body.style.backgroundColor = "blue";
        }
        function onClickGreen() {
            document.body.style.backgroundColor = "green";
        }
    </script>
</head>

<body>
    <h1>ThemeColorChange</h1>
    <button id="btnRed" onclick="onClickRed()"
        style="background-color: red;color:white;border-radius:50px;">Red</button>
    <button id="btnBlue" onclick="onClickBlue()"
        style="background-color: blue;color:white;border-radius:50px;">Blue</button>
    <button id="btnGreen" onclick="onClickGreen()"
        style="background-color: green;color:white;border-radius:50px;">green</button>
        <mark>Pallavi Sesetti</mark>
        <mark>Pallavi</mark>
</body>

</html>
