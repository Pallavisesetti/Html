<!DOCTYPE html>
<html>
    <head>
        <script>
            function onClickChange() {
                var fontSize=document.getElementById("txtFontsize").value;
                document.getElementById("pText").style.fontSize =fontSize+"px";

            }
            
        </script>
        </head>
        <body>
            <label id="lblFontsize">Fontsize</label>
            <input type="number" id="txtFontsize">
            <p id="pText">I am Pallavi Sesetti</p>
            <button id="btnChange" onclick="onClickChange()">Change</button>
        </body>
    
</html>
